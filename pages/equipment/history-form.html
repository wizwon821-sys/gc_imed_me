<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이력 등록</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="../../assets/css/pages/equipment-form.css" />
</head>
<body class="portal-page equipment-form-page">
  <div class="container page-shell equipment-form-shell">
    <section class="top-brand-bar portal-topbar portal-hero-card equipment-form-topbar">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">의료장비 관리시스템</strong>
          <span class="top-brand-sub">수리 · 점검 이력 등록</span>
        </div>
      </div>

      <div class="top-brand-actions equipment-form-top-actions">
        <a class="portal-header-btn portal-header-btn--secondary" href="../../portal.html">HOME</a>
        <a class="portal-header-btn portal-header-btn--secondary" href="dashboard.html">대시보드</a>
        <a class="portal-header-btn portal-header-btn--secondary" href="list.html">장비목록</a>
      </div>
    </section>

    <section class="page-hero-simple equipment-form-hero">
      <div class="equipment-form-hero-copy">
        <span class="portal-section-kicker">HISTORY FORM</span>
        <h1 class="page-title">이력 등록</h1>
        <p class="page-desc">수리 및 점검 이력을 기록합니다.</p>
      </div>
    </section>

    <div id="messageBox" class="message-box"></div>

    <form id="historyForm" class="card form-card equipment-form-card">
      <div class="section-head equipment-form-section-head">
        <div>
          <span class="portal-section-kicker">TARGET EQUIPMENT</span>
          <h2 class="section-title">대상 장비</h2>
          <div class="sub-text equipment-form-section-desc">
            선택한 장비 정보를 확인한 뒤 이력을 등록합니다.
          </div>
        </div>
      </div>

      <div class="form-grid two-col">
        <label class="form-field">
          <span class="form-label">장비번호</span>
          <input type="text" id="equipment_id" class="input" readonly />
        </label>

        <label class="form-field">
          <span class="form-label">장비명</span>
          <input type="text" id="equipment_name" class="input" readonly />
        </label>
      </div>

      <div class="section-head equipment-form-section-head" style="margin-top:24px;">
        <div>
          <span class="portal-section-kicker">HISTORY INFO</span>
          <h2 class="section-title">이력 정보</h2>
          <div class="sub-text equipment-form-section-desc">
            처리 내용과 상태를 입력하세요.
          </div>
        </div>
      </div>

      <div class="form-grid two-col">
        <label class="form-field">
          <span class="form-label required">이력 유형</span>
          <select id="history_type" class="input" required>
            <option value="">선택하세요</option>
            <option value="REPAIR">수리</option>
            <option value="INSPECTION">점검</option>
            <option value="MAINTENANCE">유지보수</option>
            <option value="OTHER">기타</option>
          </select>
        </label>

        <label class="form-field">
          <span class="form-label">요청부서</span>
          <input
            type="text"
            id="request_department"
            class="input"
            readonly
          />
        </label>

        <label class="form-field">
          <span class="form-label">요청자</span>
          <input type="text" id="requester" class="input" placeholder="요청자를 입력하세요" />
        </label>

        <label class="form-field">
          <span class="form-label required">처리일자</span>
          <input type="date" id="work_date" class="input" required />
        </label>

        <label class="form-field">
          <span class="form-label">비용</span>
          <input type="text" inputmode="numeric" id="amount" class="input" placeholder="숫자만 입력" />
        </label>

        <label class="form-field">
          <span class="form-label">업체명</span>
          <input type="text" id="vendor_name" class="input" placeholder="업체명을 입력하세요" />
        </label>

        <label class="form-field">
          <span class="form-label">처리 결과 상태</span>
          <select id="result_status" class="input">
            <option value="">선택하세요</option>
            <option value="COMPLETED">완료</option>
            <option value="IN_PROGRESS">진행중</option>
            <option value="PENDING">대기</option>
          </select>
        </label>

        <label class="form-field">
          <span class="form-label">장비 상태 반영</span>
          <select id="update_equipment_status" class="input">
            <option value="">반영 안 함</option>
            <option value="IN_USE">사용중</option>
            <option value="REPAIRING">수리중</option>
            <option value="INSPECTING">점검중</option>
            <option value="STORED">보관</option>
            <option value="DISPOSED">폐기</option>
          </select>
        </label>

        <label class="form-field full-col">
          <span class="form-label required">처리내용</span>
          <textarea
            id="description"
            class="textarea"
            rows="6"
            placeholder="수리 또는 점검 내용을 입력하세요"
            required
          ></textarea>
        </label>
      </div>

      <div class="form-actions">
        <a href="#" id="backToDetailBtn" class="btn">상세로 돌아가기</a>
        <button type="submit" id="submitBtn" class="btn btn-primary">저장</button>
      </div>
    </form>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/core/app-permission.js"></script>
  <script src="../../assets/js/equipment/history-form.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>
</body>
</html>
