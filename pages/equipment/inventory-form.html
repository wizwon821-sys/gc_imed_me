<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재고조사 등록</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="../../assets/css/pages/equipment-form.css" />
</head>
<body class="portal-page equipment-form-page">
  <div class="container page-shell equipment-form-shell">
    <section class="top-brand-bar portal-topbar portal-hero-card equipment-form-topbar">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">의료장비 관리시스템</strong>
          <span class="top-brand-sub">재고조사 등록</span>
        </div>
      </div>

      <div class="top-brand-actions equipment-form-top-actions">
        <a class="portal-header-btn portal-header-btn--secondary" href="../../portal.html">HOME</a>
        <a class="portal-header-btn portal-header-btn--secondary" href="dashboard.html">대시보드</a>
        <a class="portal-header-btn portal-header-btn--secondary" href="list.html">장비목록</a>
      </div>
    </section>

    <section class="page-hero-simple equipment-form-hero">
      <div class="equipment-form-hero-copy">
        <span class="portal-section-kicker">INVENTORY FORM</span>
        <h1 class="page-title">재고조사 등록</h1>
        <p class="page-desc">장비 재고 상태를 기록합니다.</p>
      </div>
    </section>

    <div id="messageBox" class="message-box"></div>

    <form id="inventoryForm" class="card form-card equipment-form-card">
      <div class="section-head equipment-form-section-head">
        <div>
          <span class="portal-section-kicker">TARGET EQUIPMENT</span>
          <h2 class="section-title">대상 장비</h2>
          <div class="sub-text equipment-form-section-desc">
            재고조사 대상 장비 정보를 확인합니다.
          </div>
        </div>
      </div>

      <div class="form-grid two-col">
        <label class="form-field">
          <span class="form-label">장비번호</span>
          <input type="text" id="equipment_id" class="input" readonly />
        </label>

        <label class="form-field">
          <span class="form-label">장비명</span>
          <input type="text" id="equipment_name" class="input" readonly />
        </label>

        <label class="form-field">
          <span class="form-label">사용부서</span>
          <input type="text" id="department_at_check" class="input" readonly />
        </label>

        <label class="form-field">
          <span class="form-label">위치</span>
          <input type="text" id="location_at_check" class="input" readonly />
        </label>
      </div>

      <div class="section-head equipment-form-section-head" style="margin-top:24px;">
        <div>
          <span class="portal-section-kicker">CHECK INFO</span>
          <h2 class="section-title">재고 정보</h2>
        </div>
      </div>

      <div class="form-grid two-col">
        <label class="form-field">
          <span class="form-label required">점검일시</span>
          <input type="text" id="checked_at" class="input" readonly required />
        </label>

        <label class="form-field">
          <span class="form-label required">점검자</span>
          <input type="text" id="checked_by" class="input" placeholder="점검자 이름을 입력하세요" required />
        </label>

        <label class="form-field">
          <span class="form-label required">상태</span>
          <select id="condition_status" class="input" required>
            <option value="">선택하세요</option>
            <option value="NORMAL">정상</option>
            <option value="ABNORMAL">이상</option>
            <option value="NEEDS_CHECK">확인필요</option>
            <option value="MISSING">미확인</option>
          </select>
        </label>

        <label class="form-field">
          <span class="form-label">QR 스캔 여부</span>
          <select id="qr_scan_yn" class="input">
            <option value="Y">예</option>
            <option value="N">아니오</option>
          </select>
        </label>

        <label class="form-field full-col">
          <span class="form-label">메모</span>
          <textarea id="memo" class="textarea" rows="6" placeholder="재고조사 관련 메모를 입력하세요"></textarea>
        </label>
      </div>

      <div class="form-actions">
        <a href="#" id="backToDetailBtn" class="btn">상세로 돌아가기</a>
        <button type="submit" id="submitBtn" class="btn btn-primary">저장</button>
      </div>
    </form>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/core/app-permission.js"></script>
  <script src="../../assets/js/equipment/inventory-form.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>
</body>
</html>
