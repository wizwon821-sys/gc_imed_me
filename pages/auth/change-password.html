<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 변경</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f7fb;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    .change-shell {
      width: 100%;
      max-width: 460px;
    }

    .change-card {
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 10px 32px rgba(15, 23, 42, 0.08);
    }

    .change-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 800;
      color: #0f172a;
    }

    .change-desc {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.6;
      color: #667085;
    }

    .change-form {
      margin-top: 24px;
      display: grid;
      gap: 14px;
    }

    .change-field {
      display: grid;
      gap: 6px;
    }

    .change-field label {
      font-size: 13px;
      font-weight: 800;
      color: #344054;
    }

    .change-field input {
      width: 100%;
      min-height: 52px;
      padding: 0 14px;
      border: 1px solid #d0d5dd;
      border-radius: 14px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }

    .change-field input:focus {
      outline: none;
      border-color: #0b1b46;
      box-shadow: 0 0 0 4px rgba(11, 27, 70, 0.08);
    }

    .change-hint {
      margin-top: -4px;
      font-size: 12px;
      color: #667085;
      line-height: 1.5;
    }

    .change-btn {
      width: 100%;
      min-height: 54px;
      border: none;
      border-radius: 16px;
      background: #0b1b46;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .change-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .message-box {
      min-height: 20px;
      font-size: 13px;
      line-height: 1.5;
    }

    .message-box.error {
      color: #b42318;
    }

    .message-box.success {
      color: #027a48;
    }

    #globalLoading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.22);
      backdrop-filter: blur(2px);
    }

    #globalLoading.is-open {
      display: flex;
    }

    .global-loading__dialog {
      min-width: 220px;
      max-width: calc(100vw - 48px);
      padding: 20px 24px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .global-loading__spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #d0d5dd;
      border-top-color: #0b1b46;
      border-radius: 50%;
      animation: globalLoadingSpin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    .global-loading__text {
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
    }

    @keyframes globalLoadingSpin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 640px) {
      .change-card {
        padding: 24px 18px;
        border-radius: 20px;
      }

      .change-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="change-shell">
    <section class="change-card">
      <h1 class="change-title">비밀번호 변경</h1>
      <p class="change-desc">
        첫 로그인 시에는 초기 비밀번호를 새 비밀번호로 변경해야 합니다.
      </p>

      <form id="changePasswordForm" class="change-form">
        <div class="change-field">
          <label for="currentPassword">현재 비밀번호</label>
          <input type="password" id="currentPassword" placeholder="현재 비밀번호 입력" autocomplete="current-password">
          <div class="change-hint">초기 비밀번호는 <strong>1111</strong> 입니다.</div>
        </div>

        <div class="change-field">
          <label for="newPassword">새 비밀번호</label>
          <input type="password" id="newPassword" placeholder="새 비밀번호 입력" autocomplete="new-password">
        </div>

        <div class="change-field">
          <label for="confirmPassword">새 비밀번호 확인</label>
          <input type="password" id="confirmPassword" placeholder="새 비밀번호 다시 입력" autocomplete="new-password">
        </div>

        <div id="changePasswordMessage" class="message-box"></div>

        <button type="submit" class="change-btn" id="changePasswordBtn">
          비밀번호 변경
        </button>
      </form>
    </section>
  </main>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog" role="status" aria-live="polite">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">처리 중...</div>
    </div>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/auth/change-password.js"></script>
</body>
</html>
