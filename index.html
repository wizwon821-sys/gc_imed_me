<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSO관리팀 업무지원시스템</title>
  <link rel="stylesheet" href="assets/css/common.css">
  <style>
    body.auth-page {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-shell {
      width: 100%;
      max-width: 460px;
    }

    .auth-card {
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 24px;
      box-shadow:
        0 10px 30px rgba(15, 23, 42, 0.08),
        0 2px 8px rgba(15, 23, 42, 0.04);
      padding: 28px;
    }

    .auth-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .auth-brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #22c55e, #2563eb);
      color: #fff;
      font-size: 20px;
      font-weight: 800;
    }

    .auth-brand-text strong {
      display: block;
      font-size: 18px;
      line-height: 1.35;
      color: #0f172a;
    }

    .auth-brand-text span {
      display: block;
      margin-top: 2px;
      font-size: 13px;
      line-height: 1.45;
      color: #667085;
    }

    .auth-title {
      margin: 0 0 6px;
      font-size: 26px;
      line-height: 1.25;
      color: #0f172a;
    }

    .auth-desc {
      margin: 0 0 20px;
      font-size: 14px;
      line-height: 1.55;
      color: #667085;
    }

    .auth-form {
      display: grid;
      gap: 14px;
    }

    .auth-form .field-group {
      display: grid;
      gap: 8px;
    }

    .auth-form label {
      font-size: 13px;
      font-weight: 800;
      color: #344054;
    }

    .auth-form input {
      width: 100%;
      min-height: 52px;
      padding: 0 16px;
      border: 1px solid #d0d5dd;
      border-radius: 16px;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .auth-form input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .auth-submit-btn {
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      background: #0b1b46;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .auth-submit-btn:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .auth-message {
      min-height: 20px;
      font-size: 13px;
      line-height: 1.45;
    }

    .auth-message.is-error {
      color: #b42318;
    }

    .auth-message.is-success {
      color: #027a48;
    }

    @media (max-width: 768px) {
      body.auth-page {
        padding: 16px;
      }

      .auth-card {
        padding: 22px;
        border-radius: 20px;
      }

      .auth-title {
        font-size: 22px;
      }

      .auth-desc {
        font-size: 13px;
        margin-bottom: 16px;
      }

      .auth-form {
        gap: 12px;
      }

      .auth-form input,
      .auth-submit-btn {
        min-height: 48px;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-badge">+</div>
        <div class="auth-brand-text">
          <strong>MSO관리팀 업무지원시스템</strong>
          <span>로그인 후 사용할 앱을 선택할 수 있습니다.</span>
        </div>
      </div>
      
      <!--
      <h1 class="auth-title">로그인</h1>
      <p class="auth-desc">등록된 아이디와 비밀번호로 로그인해 주세요.</p>
      -->
      
      <div class="auth-form">
        <div class="field-group">
          <label for="userEmail">아이디</label>
          <input type="text" id="userEmail" placeholder="아이디 입력" autocomplete="username">
        </div>

        <div class="field-group">
          <label for="userPassword">비밀번호</label>
          <input type="password" id="userPassword" placeholder="비밀번호 입력" autocomplete="current-password">
        </div>

        <button type="button" class="auth-submit-btn" id="loginBtn">로그인</button>
        <div id="authMessage" class="auth-message"></div>
        <div style="text-align:center; margin-top:4px; font-size:13px; color:#667085;">
          계정이 없으신가요?
          <a href="pages/auth/register.html" style="color:#2563eb; font-weight:700; text-decoration:none;">가입 신청</a>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/core/config.js"></script>
  <script src="assets/js/core/utils.js"></script>
  <script src="assets/js/core/api.js"></script>
  <script src="assets/js/core/auth.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">로딩 중...</div>
    </div>
  </div>
</body>
</html>
